# ==============================================================================
# Cluster Inventory
# ==============================================================================
# Each entry represents one EKS cluster in a dedicated AWS GovCloud account.
# Add/remove entries as clusters are provisioned or decommissioned.
#
# Filtering:
#   Set CLUSTER_FILTER when triggering the pipeline to target a subset.
#   Supports:
#     - Cluster names:  CLUSTER_FILTER="prod-us-gov-west-1-fps"
#     - Tags:           CLUSTER_FILTER="tag:prod"  or  CLUSTER_FILTER="tag:wave-1"
#     - All (default):  CLUSTER_FILTER=""  or  CLUSTER_FILTER="all"
# ==============================================================================

defaults:
  namespace: datadog
  secret_name: datadog-secret
  secret_key: api-key
  role_session_name: gitlab-ci

clusters:
  - name: prod-us-gov-west-1-fps
    aws_account_id: "060597140294"
    aws_region: us-gov-west-1
    cluster_name: NGDC-FPS-EKS-cluster
    role_arn: arn:aws-us-gov:iam::060597140294:role/NGDCGitLabTerraformAdminRole
    tags: [prod, us-gov-west-1, fps, wave-1]

  # -------------------------------------------------------------------------
  # Add remaining clusters below. Example:
  # -------------------------------------------------------------------------
  # - name: prod-us-gov-west-1-payments
  #   aws_account_id: "123456789012"
  #   aws_region: us-gov-west-1
  #   cluster_name: NGDC-PAYMENTS-EKS-cluster
  #   role_arn: arn:aws-us-gov:iam::123456789012:role/NGDCGitLabTerraformAdminRole
  #   tags: [prod, us-gov-west-1, payments, wave-1]
  #
  # - name: prod-us-gov-west-1-data
  #   aws_account_id: "987654321098"
  #   aws_region: us-gov-west-1
  #   cluster_name: NGDC-DATA-EKS-cluster
  #   role_arn: arn:aws-us-gov:iam::987654321098:role/NGDCGitLabTerraformAdminRole
  #   tags: [prod, us-gov-west-1, data, wave-2]
