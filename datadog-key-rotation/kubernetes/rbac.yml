# ==============================================================================
# RBAC — Kubernetes permissions for the rotation pipeline
# ==============================================================================
# The pipeline assumes an IAM role that maps to a Kubernetes user via the
# aws-auth ConfigMap (or EKS access entries). This ClusterRole + Binding
# grants the minimum permissions needed:
#   - Get/Patch secrets in the datadog namespace
#   - Get/List pods, daemonsets, deployments (for rollout restart & health check)
#
# Apply this in every EKS cluster (include in your existing cluster bootstrap).
# ==============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dd-key-rotation
  labels:
    app.kubernetes.io/part-of: datadog-key-rotation
rules:
  # Secret access — scoped to specific verbs only
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "patch"]
  # Pod/DaemonSet/Deployment — needed for rollout restart and health checks
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["daemonsets", "deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["apps"]
    resources: ["daemonsets/status", "deployments/status"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dd-key-rotation
  labels:
    app.kubernetes.io/part-of: datadog-key-rotation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dd-key-rotation
subjects:
  # This maps to the IAM role assumed by the pipeline.
  # Option A: aws-auth ConfigMap mapping (mapRoles entry)
  # Option B: EKS Access Entry (preferred on EKS 1.28+)
  #
  # If using aws-auth, add this to the mapRoles section:
  #   - rolearn: arn:aws:iam::<ACCOUNT_ID>:role/GitLabDDKeyRotationRole
  #     username: dd-key-rotation
  #     groups:
  #       - dd-key-rotation-group
  #
  # Then use the group name here:
  - kind: Group
    name: dd-key-rotation-group
    apiGroup: rbac.authorization.k8s.io
