# ==============================================================================
# Datadog API Key Rotation Pipeline
# ==============================================================================
# Scheduled to run every 60 days (configure in GitLab > CI/CD > Schedules).
# Can also be triggered manually from the GitLab UI.
#
# Stages:
#   1. rotate    — Create new DD API key, update GitLab CI/CD variable
#   2. generate  — Build dynamic child pipeline for parallel cluster rollout
#   3. rollout   — (child pipeline) Update K8s secret + restart agents per cluster
#   4. verify    — Confirm all clusters reporting to Datadog with new key
#   5. revoke    — Delete the old API key from Datadog
# ==============================================================================

stages:
  - rotate
  - generate
  - rollout
  - verify
  - revoke

variables:
  TF_ROOT: ${CI_PROJECT_DIR}
  GIT_STRATEGY: clone
  GIT_SSL_NO_VERIFY: "true"
  DD_API_KEY_VAR_NAME: GITLAB_DATADOG_API_TOKEN
  CONFIG_FILE: config/clusters.json
  VERIFY_TIMEOUT: "600"
  ROLLOUT_TIMEOUT: "300s"
  # ---------------------------------------------------------------------------
  # Cluster targeting — set when triggering manually to target a subset.
  #   ""  or "all"                           — All clusters (default)
  #   "prod-us-gov-west-1-fps"              — Single cluster by name
  #   "prod-us-gov-west-1-fps,prod-data"    — Multiple clusters by name
  #   "tag:prod"                            — All clusters tagged "prod"
  #   "tag:wave-1"                          — Rollout wave 1 only
  #   "tag:prod+us-gov-west-1"              — Clusters with BOTH tags (AND)
  # ---------------------------------------------------------------------------
  CLUSTER_FILTER: ""
  # Set to "true" to skip key creation and only push the current key
  # to the filtered clusters. Useful for:
  #   - Re-running failed clusters after a partial rollout
  #   - Onboarding new clusters that need the current key
  #   - Testing the rollout on a canary cluster before full rotation
  ROLLOUT_ONLY: "false"
  # Set to "true" to test connectivity and logic without creating keys
  # or modifying anything. Validates: proxy, DD API auth, GitLab API auth.
  DRY_RUN: "false"

# ---------------------------------------------------------------------------
# Shell executor — tools (aws, kubectl, jq, yq) are pre-installed on runner
# ---------------------------------------------------------------------------
.common: &common
  tags:
    - EKS_RUNNER_GITLAB

.default-auth:
  <<: *common
  before_script:
    - source scripts/helpers.sh

# ===========================================================================
# Stage 1: Rotate — Create new key and update GitLab variable
# Skipped when ROLLOUT_ONLY=true (just pushes existing key)
# ===========================================================================
rotate-api-key:
  extends: .default-auth
  stage: rotate
  script:
    - bash scripts/rotate_key.sh
  artifacts:
    paths:
      - rotation_state.json
    expire_in: 1 day
  rules:
    - if: '$ROLLOUT_ONLY == "true"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$FORCE_ROTATION == "true"'

# ===========================================================================
# Stage 1 (alt): Rollout-only — create a synthetic rotation state using
# the current GITLAB_DATADOG_API_TOKEN (no new key creation, no revocation)
# ===========================================================================
prepare-rollout-only:
  extends: .default-auth
  stage: rotate
  script:
    - |
      log_info "ROLLOUT_ONLY mode — using current GITLAB_DATADOG_API_TOKEN for targeted rollout"
      log_info "CLUSTER_FILTER: ${CLUSTER_FILTER:-all}"
      if [ -z "${GITLAB_DATADOG_API_TOKEN:-}" ]; then
        log_error "GITLAB_DATADOG_API_TOKEN is not set. Cannot proceed with rollout-only mode."
        exit 1
      fi
      log_info "GITLAB_DATADOG_API_TOKEN is set (length: ${#GITLAB_DATADOG_API_TOKEN}, last4: ${GITLAB_DATADOG_API_TOKEN: -4})"
      jq -n \
        --arg new_key "$GITLAB_DATADOG_API_TOKEN" \
        --arg mode "rollout_only" \
        --arg filter "${CLUSTER_FILTER:-all}" \
        --arg pipeline_id "${CI_PIPELINE_ID:-manual}" \
        --arg created_at "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" \
        '{
          new_key: $new_key,
          new_key_id: "existing",
          old_key_id: "n/a",
          old_key_last4: "n/a",
          rotated_at: $created_at,
          pipeline_id: $pipeline_id,
          mode: $mode,
          cluster_filter: $filter
        }' > rotation_state.json
  artifacts:
    paths:
      - rotation_state.json
    expire_in: 1 day
  rules:
    - if: '$ROLLOUT_ONLY == "true"'

# ===========================================================================
# Stage 2: Generate — Build child pipeline YAML for parallel rollout
# ===========================================================================
generate-rollout-matrix:
  extends: .default-auth
  stage: generate
  script:
    - bash scripts/generate_matrix.sh
  artifacts:
    paths:
      - child-pipeline.yml
      - rotation_state.json
      - cluster_matrix.txt
    expire_in: 1 day
  rules:
    - if: '$ROLLOUT_ONLY == "true"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$FORCE_ROTATION == "true"'

# ===========================================================================
# Stage 3: Rollout — Trigger child pipeline for parallel cluster updates
# ===========================================================================
rollout-clusters:
  stage: rollout
  trigger:
    include:
      - artifact: child-pipeline.yml
        job: generate-rollout-matrix
    strategy: depend
  needs:
    - job: generate-rollout-matrix
      artifacts: true
  rules:
    - if: '$ROLLOUT_ONLY == "true"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$FORCE_ROTATION == "true"'

# ===========================================================================
# Stage 4: Verify — Confirm clusters are reporting (threshold-based)
# Single pass, no polling loop. Passes if >= VERIFY_THRESHOLD% of clusters
# are reporting (default 80%). This prevents 1 slow cluster from blocking
# the entire rotation while still catching widespread failures.
# ===========================================================================
verify-clusters:
  extends: .default-auth
  stage: verify
  script:
    - bash scripts/verify.sh
  artifacts:
    paths:
      - rotation_state.json
    expire_in: 7 days
  needs:
    - job: rollout-clusters
    - job: generate-rollout-matrix
      artifacts: true
  rules:
    - if: '$ROLLOUT_ONLY == "true"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$FORCE_ROTATION == "true"'

# ===========================================================================
# Stage 5: Revoke — Delete the old API key
# Skipped in ROLLOUT_ONLY mode (no new key was created, nothing to revoke)
# ===========================================================================
revoke-old-key:
  extends: .default-auth
  stage: revoke
  script:
    - bash scripts/revoke_old_key.sh
  artifacts:
    paths:
      - rotation_state.json
    expire_in: 30 days
  needs:
    - job: verify-clusters
      artifacts: true
  rules:
    - if: '$ROLLOUT_ONLY == "true"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$FORCE_ROTATION == "true"'

